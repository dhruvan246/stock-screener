name: Refresh stock dataset

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas

      - name: Run scraper
        run: python build_dataset_screenerin.py
        timeout-minutes: 15

      - name: Commit dataset.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain dataset.json)" ]; then
            git add dataset.json
            git commit -m "auto: refresh dataset $(date -u +%Y-%m-%d)"
            git push
            echo "Dataset committed."
          else
            echo "No changes."
          fi
