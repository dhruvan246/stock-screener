<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Screener · Stock Screener</title>
<style>
  :root{
    --bg:#0f1419; --card:#1a212b; --card-2:#161c25; --text:#e6edf3; --muted:#8b949e;
    --accent:#3fb950; --accent-2:#2ea043; --warn:#d29922; --danger:#f85149;
    --row-hover:#222b36; --border:#30363d; --link:#58a6ff;
    --chip-bg:#22272e; --chip-fg:#adbac7;
    --query-bg:rgba(88,166,255,.08);
    --pos:#3fb950; --neg:#f85149;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Roboto,-apple-system,Segoe UI,sans-serif;
       background:var(--bg);color:var(--text);line-height:1.5;font-size:14px}
  a{color:var(--link);text-decoration:none}
  a:hover{text-decoration:underline}

  .topnav{display:flex;align-items:center;gap:18px;padding:14px 24px;
          border-bottom:1px solid var(--border);background:var(--card-2)}
  .topnav .brand{font-weight:600;font-size:16px;color:var(--text);margin-right:8px}
  .topnav a{color:var(--muted);font-size:14px}
  .topnav a.active{color:var(--text);font-weight:600}

  .layout{display:grid;grid-template-columns:260px 1fr;gap:0;min-height:calc(100vh - 53px)}
  .sidebar{border-right:1px solid var(--border);padding:18px 12px;background:var(--card-2)}
  .main{padding:18px 24px}

  .nav-group{margin-bottom:10px}
  .nav-group-head{display:flex;align-items:center;justify-content:space-between;gap:6px;
                  padding:8px 10px;font-size:13px;color:var(--text);cursor:pointer;font-weight:600}
  .nav-group-head .chev{font-size:11px;color:var(--muted)}
  .nav-items{display:flex;flex-direction:column;padding:0 4px 4px}
  .nav-items a{display:block;padding:7px 12px;font-size:13px;color:var(--muted);border-radius:6px;margin-bottom:1px}
  .nav-items a:hover{background:var(--row-hover);color:var(--text);text-decoration:none}
  .nav-items a.active{background:var(--card);color:var(--text);font-weight:500;
                      border-left:3px solid var(--accent);padding-left:9px}

  /* Sub-tabs */
  .subnav{display:flex;align-items:center;gap:24px;padding-bottom:10px;border-bottom:1px solid var(--border);
          margin-bottom:14px;flex-wrap:wrap;font-size:13px}
  .subnav a{color:var(--muted);padding:4px 2px}
  .subnav a.active{color:var(--link);border-bottom:2px solid var(--link);padding-bottom:8px;margin-bottom:-11px;font-weight:600}

  .crumb{color:var(--muted);font-size:13px;margin-bottom:8px}
  .crumb a{color:var(--link)}
  .crumb .sep{margin:0 4px;color:var(--border)}

  .title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:8px}
  .title-row h1{margin:0;font-size:22px;font-weight:700;color:var(--text)}
  .desc{color:var(--muted);font-size:13px;margin-bottom:14px}

  /* Action buttons (top right) */
  .top-actions{display:flex;gap:6px;align-items:flex-end}
  .top-action{display:flex;flex-direction:column;align-items:center;font-size:11px;color:var(--muted);gap:3px}
  .top-action .btn{width:38px;height:38px;border-radius:8px;background:var(--card-2);
                   border:1px solid var(--border);color:var(--text);font-size:14px;cursor:pointer;
                   display:flex;align-items:center;justify-content:center}
  .top-action .btn:hover{background:var(--row-hover)}
  .top-action.delete .btn:hover{color:var(--danger);border-color:var(--danger)}
  .top-action .lbl{font-size:11px;color:var(--muted)}

  /* Query bar */
  .query-bar{background:var(--query-bg);border:1px solid rgba(88,166,255,.2);border-radius:8px;
             padding:10px 14px;display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .query-bar .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .query-bar .q-text{flex:1;font-size:13px;font-family:ui-monospace,Menlo,Consolas,monospace;color:var(--text);min-width:200px}
  .query-bar .actions{display:flex;gap:8px}
  .query-bar .btn-edit{background:transparent;color:var(--link);border:0;font-weight:600;font-size:12px;
                       padding:6px 10px;text-transform:uppercase;cursor:pointer;letter-spacing:.04em}
  .query-bar .btn-edit:hover{text-decoration:underline}
  .query-bar .btn-copy{background:var(--link);color:#fff;border:0;border-radius:6px;font-weight:600;
                       padding:6px 14px;text-transform:uppercase;cursor:pointer;letter-spacing:.04em;font-size:12px}
  .query-bar .btn-copy:hover{background:#4493e0}

  /* Filters bar */
  .filters{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px}
  .field{display:flex;flex-direction:column;gap:3px}
  .field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .field select,.field input{padding:7px 28px 7px 10px;background:var(--card);border:1px solid var(--border);
                              border-radius:6px;color:var(--text);font:inherit;font-size:13px;min-width:140px;
                              appearance:none;background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 12 12"><path fill="%238b949e" d="M2 4l4 4 4-4"/></svg>');background-repeat:no-repeat;background-position:right 10px center}
  .field input{background-image:none;padding-right:10px}
  .filters .spacer{flex:1}
  .filters .small{min-width:80px}

  /* Table */
  .table-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:auto;max-height:70vh}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{padding:14px 12px;text-align:right;color:var(--muted);font-weight:600;
           font-size:11px;text-transform:none;letter-spacing:.01em;
           background:var(--card-2);border-bottom:1px solid var(--border);white-space:nowrap;
           cursor:pointer;user-select:none;position:sticky;top:0;z-index:1}
  thead th.left{text-align:left}
  thead th:hover{color:var(--text)}
  thead th .arrow{display:inline-block;color:var(--accent);margin-left:3px;font-size:10px}
  thead th.sorted{color:var(--link)}
  tbody td{padding:14px 12px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
  tbody td.left{text-align:left}
  tbody tr:hover{background:var(--row-hover)}
  tbody tr:last-child td{border-bottom:0}

  .rank{color:var(--muted);font-size:13px;padding-right:6px}
  .stock-name{font-weight:600;color:var(--link);font-size:13px}
  .stock-meta{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
  .stock-cell{display:flex;flex-direction:column;align-items:flex-start;gap:0}
  .dvm{display:flex;gap:3px;margin-top:4px}
  .dvm span{width:10px;height:10px;border-radius:2px;background:var(--muted);opacity:.5}
  .dvm span.g{background:var(--pos);opacity:1}
  .dvm span.r{background:var(--neg);opacity:1}
  .dvm span.o{background:var(--warn);opacity:1}
  .num.pos{color:var(--pos);font-weight:500}
  .num.neg{color:var(--neg);font-weight:500}
  .num.muted{color:var(--muted)}
  .num.highlighted{background:var(--query-bg)}

  /* Pagination */
  .pager{display:flex;justify-content:space-between;align-items:center;padding:12px 4px;
         color:var(--muted);font-size:13px;flex-wrap:wrap;gap:8px}
  .pager .pages{display:flex;gap:4px}
  .pager .pages button{min-width:32px;height:32px;padding:0 8px;font:inherit;background:var(--card);
                       color:var(--text);border:1px solid var(--border);border-radius:6px;cursor:pointer}
  .pager .pages button:hover{background:var(--row-hover)}
  .pager .pages button.active{background:var(--link);border-color:var(--link);color:#fff}
  .pager .pages button:disabled{opacity:.5;cursor:not-allowed}

  .empty-state{padding:48px;text-align:center;color:var(--muted)}
  .empty-state h3{color:var(--text);font-size:18px;margin:0 0 8px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
         background:var(--card);border:1px solid var(--border);color:var(--text);
         padding:10px 16px;border-radius:8px;font-size:13px;
         box-shadow:0 4px 16px rgba(0,0,0,.4);
         opacity:0;pointer-events:none;transition:opacity .2s;z-index:99}
  .toast.show{opacity:1}

  @media (max-width: 880px){
    .layout{grid-template-columns:1fr}
    .sidebar{border-right:0;border-bottom:1px solid var(--border)}
  }
</style>
</head>

<div class="toast" id="toast"></div>

<script>
const PRESET_KEY = "screener_presets_v1";

function toast(msg, ms=1600){
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(toast._t); toast._t = setTimeout(()=>el.classList.remove("show"), ms);
}
function readPresets(){
  try { return JSON.parse(localStorage.getItem(PRESET_KEY) || "{}") || {}; }
  catch { return {}; }
}
function writePresets(p){ localStorage.setItem(PRESET_KEY, JSON.stringify(p)); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---------- Hash decoding ----------
function readHashScreen(){
  const h = location.hash.slice(1);
  if (!h) return null;
  const qIdx = h.indexOf('&');
  const rowsPart = qIdx === -1 ? h : h.slice(0, qIdx);
  const argsStr = qIdx === -1 ? '' : h.slice(qIdx + 1);
  let rows = null, name = null;
  try { rows = JSON.parse(decodeURIComponent(rowsPart)); } catch {}
  if (argsStr){
    const args = new URLSearchParams(argsStr);
    if (args.get('name')) name = args.get('name');
  }
  return rows ? { rows, name } : null;
}

let DATA = null;
let METRICS = [];
let METRIC_LABELS = {};
let METRIC_UNIT = {};
let METRIC_GROUP = {};
let ROWS = [];           // active criteria
let NAME = null;
let HITS = [];           // filtered stocks
let sortKey = null;
let sortDir = -1;
let currentPage = 1;
let pageSize = 25;

async function loadData(){
  const r = await fetch("dataset.json", {cache:"no-store"});
  if (!r.ok) throw new Error("dataset.json HTTP "+r.status);
  DATA = await r.json();
  METRICS = DATA.metrics || [];
  METRICS.forEach(m => {
    METRIC_LABELS[m.key] = m.label;
    METRIC_UNIT[m.key] = m.unit;
    METRIC_GROUP[m.key] = m.group;
  });
}

function metricLabel(key){
  if (key === "symbol") return "Stock";
  if (key === "name") return "Name";
  if (key === "sector") return "Sector";
  if (key === "ltp") return "LTP";
  if (key === "market_cap_cr") return "Market Cap";
  const m = METRICS.find(m => m.key === key);
  return m ? m.label : key;
}

function matchRow(s, rows){
  if (!rows.length) return false;
  let result = true;
  for (let i = 0; i < rows.length; i++){
    const r = rows[i];
    const v = s[r.metric];
    let pass;
    if (v == null) pass = false;
    else {
      const x = parseFloat(r.value);
      switch (r.op){
        case ">":  pass = v >  x; break;
        case ">=": pass = v >= x; break;
        case "<":  pass = v <  x; break;
        case "<=": pass = v <= x; break;
        case "=":  pass = Math.abs(v - x) < 1e-9; break;
        case "!=": pass = Math.abs(v - x) >= 1e-9; break;
        default:   pass = false;
      }
    }
    if (i === 0) result = pass;
    else if (r.join === "OR") result = result || pass;
    else                       result = result && pass;
  }
  return result;
}

function applyFilter(){
  const valid = ROWS.filter(r => r.value !== "" && r.value !== null && !isNaN(parseFloat(r.value)));
  HITS = DATA.stocks.filter(s => matchRow(s, valid));
  // Default sort: by first criterion's metric descending; then default to market cap
  if (!sortKey){
    sortKey = valid[0]?.metric || "market_cap_cr";
    sortDir = -1;
  }
  applySort();
}

function applySort(){
  HITS.sort((a, b) => {
    const x = a[sortKey], y = b[sortKey];
    if (x == null && y == null) return 0;
    if (x == null) return 1; if (y == null) return -1;
    if (typeof x === "string") return x.localeCompare(y) * sortDir;
    return (x > y ? 1 : x < y ? -1 : 0) * sortDir;
  });
}

function fmtNum(k, v){
  if (v == null) return `<span class="muted">—</span>`;
  if (typeof v === "string") return v;
  const unit = METRIC_UNIT[k] || "";
  let txt;
  if (k === "market_cap_cr" || k === "enterprise_val_cr"){
    txt = Number(v).toLocaleString("en-IN", {maximumFractionDigits:0});
  } else if (unit === "%"){
    txt = Number(v).toFixed(2) + "%";
  } else {
    txt = Number(v).toLocaleString("en-IN", {minimumFractionDigits:2, maximumFractionDigits:2});
  }
  let cls = "num";
  if (unit === "%"){
    if (v > 0) cls += " pos";
    else if (v < 0) cls += " neg";
  }
  return `<span class="${cls}">${txt}</span>`;
}

function pickColumns(){
  // Base columns + criterion-driven + the user-selected "extra" group
  const usedKeys = ROWS.map(r => r.metric);
  const base = ["symbol", "name", ...usedKeys, "market_cap_cr", "ltp"];
  const extra = document.getElementById("extra-cols").value;
  const extras = {
    growth: ["np_yoy_pct", "np_qoq_pct", "rev_yoy_pct", "rev_qoq_pct"],
    value:  ["pe_ttm", "pb", "peg", "dividend_yield_pct"],
    quality:["roe_pct", "roce_pct", "operating_margin_pct", "debt_to_equity"],
    basic:  [],
  }[extra] || [];
  const cols = [...new Set([...base, ...extras])];
  return cols;
}

function renderTable(){
  const cols = pickColumns();

  // Header
  const ths = cols.map(k => {
    const isLeft = (k === "symbol" || k === "name" || k === "sector");
    const arr = sortKey === k ? `<span class="arrow">${sortDir === 1 ? "▲" : "▼"}</span>` : "";
    const sortedCls = sortKey === k ? " sorted" : "";
    return `<th data-key="${k}" class="${isLeft ? "left" : ""}${sortedCls}">${escapeHtml(metricLabel(k))}${METRIC_UNIT[k] ? " (" + METRIC_UNIT[k] + ")" : ""}${arr}</th>`;
  }).join("");
  document.getElementById("thead").innerHTML = `<tr><th class="left" style="text-align:center;width:36px">#</th>${ths}</tr>`;

  // Filter by table-search
  const q = (document.getElementById("search").value || "").toLowerCase();
  const filtered = q
    ? HITS.filter(s => (s.symbol || "").toLowerCase().includes(q) || (s.name || "").toLowerCase().includes(q))
    : HITS;

  // Pagination slice
  const ps = pageSize;
  const totalPages = ps === "All" ? 1 : Math.max(1, Math.ceil(filtered.length / ps));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = ps === "All" ? 0 : (currentPage - 1) * ps;
  const end   = ps === "All" ? filtered.length : start + ps;
  const slice = filtered.slice(start, end);

  // Rows
  const tbody = document.getElementById("tbody");
  if (slice.length === 0){
    tbody.innerHTML = `<tr><td colspan="${cols.length + 1}"><div class="empty-state"><h3>No stocks match</h3><p>Try widening your criteria.</p></div></td></tr>`;
  } else {
    tbody.innerHTML = slice.map((s, i) => {
      const rank = start + i + 1;
      const usedKeys = new Set(ROWS.map(r => r.metric));
      const cells = cols.map(k => {
        if (k === "symbol"){
          return `<td class="left"><div class="stock-cell">
            <span class="stock-name">${escapeHtml(s.symbol || "")}</span>
            <div class="dvm"><span class="${s.np_yoy_pct > 0 ? 'g' : 'r'}"></span><span class="${s.roe_pct > 15 ? 'g' : (s.roe_pct < 5 ? 'r' : 'o')}"></span><span class="${s.pct_from_high < 15 ? 'g' : 'o'}"></span></div>
          </div></td>`;
        }
        if (k === "name") return `<td class="left">${escapeHtml(s.name || "")}</td>`;
        const v = s[k];
        const cls = usedKeys.has(k) ? "highlighted" : "";
        return `<td class="${cls}">${fmtNum(k, v)}</td>`;
      }).join("");
      return `<tr><td class="left rank">${rank}</td>${cells}</tr>`;
    }).join("");
  }

  // Pager + summary
  const summary = ps === "All"
    ? `Showing all ${filtered.length} of ${DATA.count} stocks`
    : `Showing ${Math.min(filtered.length, start + 1)}–${Math.min(filtered.length, end)} of ${filtered.length} matches (${DATA.count} total)`;
  document.getElementById("result-summary").textContent = summary;

  const pager = document.getElementById("pager-ctrl");
  if (totalPages <= 1){ pager.innerHTML = ""; }
  else {
    const btns = [];
    btns.push(`<button data-p="prev" ${currentPage <= 1 ? "disabled" : ""}>‹</button>`);
    const maxBtns = 7;
    let s = Math.max(1, currentPage - Math.floor(maxBtns / 2));
    let e = Math.min(totalPages, s + maxBtns - 1);
    if (e - s < maxBtns - 1) s = Math.max(1, e - maxBtns + 1);
    for (let p = s; p <= e; p++){
      btns.push(`<button data-p="${p}" class="${p === currentPage ? "active" : ""}">${p}</button>`);
    }
    btns.push(`<button data-p="next" ${currentPage >= totalPages ? "disabled" : ""}>›</button>`);
    pager.innerHTML = btns.join("");
    pager.querySelectorAll("button").forEach(b => {
      b.addEventListener("click", () => {
        const v = b.dataset.p;
        if (v === "prev") currentPage = Math.max(1, currentPage - 1);
        else if (v === "next") currentPage = Math.min(totalPages, currentPage + 1);
        else currentPage = parseInt(v, 10);
        renderTable();
      });
    });
  }

  // Wire header sorting
  document.querySelectorAll("thead th[data-key]").forEach(th => {
    th.addEventListener("click", () => {
      const k = th.dataset.key;
      if (sortKey === k) sortDir = -sortDir;
      else { sortKey = k; sortDir = -1; }
      applySort();
      renderTable();
    });
  });
}

function renderHeader(){
  document.getElementById("title").textContent = NAME || "Screen";
  document.getElementById("crumb-name").textContent = NAME || "Screen";
  document.title = (NAME || "Screen") + " · Screener";
  const labels = [...new Set(ROWS.map(r => metricLabel(r.metric)))];
  document.getElementById("desc").textContent = "This screener uses " + labels.slice(0, 3).join(", ") + (labels.length > 3 ? ", +" + (labels.length - 3) + " more" : "") + " parameters.";

  const qstr = ROWS.map((r, i) => {
    const j = i === 0 ? "" : ` ${r.join||"AND"} `;
    return `${j}${metricLabel(r.metric)} ${r.op} ${r.value}`;
  }).join("");
  document.getElementById("query").textContent = qstr;
}

// --- Action handlers ---
function wireActions(){
  const encoded = encodeURIComponent(JSON.stringify(ROWS));
  const namedHash = encoded + (NAME ? "&name=" + encodeURIComponent(NAME) : "");

  document.getElementById("btn-alert").addEventListener("click", () => toast("Alerts coming soon"));
  document.getElementById("btn-backtest").addEventListener("click", () => {
    window.open("backtest.html#" + namedHash, "_blank");
  });
  document.getElementById("btn-edit").addEventListener("click", () => {
    location.href = "builder.html#" + encoded;
  });
  document.getElementById("btn-edit2").addEventListener("click", () => {
    location.href = "builder.html#" + encoded;
  });
  document.getElementById("btn-copy").addEventListener("click", async () => {
    try { await navigator.clipboard.writeText(location.href); toast("Link copied"); }
    catch { toast("Copy failed"); }
  });
  document.getElementById("btn-delete").addEventListener("click", () => {
    if (!NAME){ toast("Unsaved screen — nothing to delete"); return; }
    if (!confirm(`Delete saved screen "${NAME}"?`)) return;
    const presets = readPresets(); delete presets[NAME]; writePresets(presets);
    toast(`Deleted "${NAME}"`);
    setTimeout(() => location.href = "my-screens.html", 500);
  });
  document.getElementById("search").addEventListener("input", () => { currentPage = 1; renderTable(); });
  document.getElementById("extra-cols").addEventListener("change", renderTable);
  document.getElementById("page-size").addEventListener("change", (e) => {
    pageSize = e.target.value === "All" ? "All" : parseInt(e.target.value, 10);
    currentPage = 1;
    renderTable();
  });
}

// --- Boot ---
(async () => {
  // Read hash
  const screen = readHashScreen();
  if (!screen){
    document.querySelector(".main").innerHTML = `<div class="empty-state"><h3>No screen criteria in URL.</h3><p>Open this page from <a href="my-screens.html">My Screens</a>.</p></div>`;
    return;
  }
  ROWS = screen.rows;
  NAME = screen.name;

  try { await loadData(); }
  catch (e){
    document.getElementById("desc").innerHTML = `<span style="color:var(--danger)">Couldn't load dataset: ${e.message}</span>`;
    return;
  }

  renderHeader();
  applyFilter();
  renderTable();
  wireActions();
})();
</script>
</body>
</html>
